<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-700">

    <header class="bg-blue-700 text-white shadow mb-8">
        <div class="container mx-auto flex flex-col sm:flex-row items-center justify-between p-4">
            <h1 class="text-2xl font-bold tracking-wide mb-2 sm:mb-0">My App</h1>
            <nav class="space-x-4">
                <a href="/" class="hover:underline hover:text-blue-200 transition">Home</a>
                <a href="/provinces" class="hover:underline hover:text-blue-200 transition">Provinces</a>
                <a href="/contact" class="hover:underline hover:text-blue-200 transition">Contact</a>
            </nav>
        </div>
    </header>

    {% block content %}{% endblock %}
</body>
</html>
