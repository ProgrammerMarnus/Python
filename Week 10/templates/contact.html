{% extends "base.html" %}

{% block title %}Contact{% endblock %}

{% block content %}
<h1 class="block text-2xl font-bold text-center">Contact Us</h1>

{% if errors %}
    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative" role="alert">
        <strong class="font-bold">Please correct the following errors:</strong>
        <ul class="list-disc pl-5">
            {% for error in errors %}
                <li>{{ error }}</li>
            {% endfor %}
        </ul>
    </div>
{% endif %}

<form action="/contact" method="POST" class="max-w-lg mx-auto mt-8 bg-white p-6 rounded-lg shadow-md border border-gray-200">
    <div class="mb-4">
        <label for="name" class="block text-gray-700 font-medium mb-2">Name</label>
        <input type="text" id="name" name="name" class="border border-gray-300 rounded-md py-2 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div class="mb-4">
        <label for="email" class="block text-gray-700 font-medium mb-2">Email</label>
        <input type="email" id="email" name="email" class="border border-gray-300 rounded-md py-2 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div class="mb-4">
        <label for="message" class="block text-gray-700 font-medium mb-2">Message</label>
        <textarea id="message" name="message" rows="5" class="border border-gray-300 rounded-md py-2 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
    </div>
    <button type="submit" class="bg-blue-700 text-white py-2 px-4 rounded-md hover:bg-blue-800 transition">Send Message</button>

</form>

{% endblock %}
