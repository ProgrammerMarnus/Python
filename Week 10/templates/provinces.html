{% extends "base.html" %}

{% block title %}Provinces{% endblock %}

{% block content %}
<div class="container mx-auto p-4">
    <h2 class="text-2xl font-bold mb-4">South African Provinces</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
        {% for key, value in provinces.items() %}
        <div class="bg-white rounded-lg shadow-md p-6 flex flex-col items-start border border-gray-200">
            <h3 class="text-lg font-semibold text-blue-700 mb-2">{{ key }}</h3>
            <p class="text-gray-700">City: <span class="font-medium">{{ value.city }}</span></p>
            <p class="text-gray-500 text-sm">Population: {{ value.population }}</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
